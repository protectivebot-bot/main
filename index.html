<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protective Bot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e2f;
      color: #f5f5f5;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 3em;
      color: #4caf50;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px;
      font-size: 1em;
      color: #fff;
      background-color: #4caf50;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }

    footer {
      margin-top: 50px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Protective Bot</h1>
  <p>Your Discord server’s guardian. Automated moderation and protection for safe servers.</p>

  <a class="btn" href="/main/terms">Terms</a>
  <a class="btn" href="/main/privacy">Privacy</a>

  <footer>
    &copy; 2026 Protective Bot | Made with ❤️ for Discord servers
  </footer>
</body>
</html>
